name: Build Windows installer

# Builds SnapExpand.exe on a real Windows machine (GitHub's hosted runner) and
# uploads it as a downloadable artifact. No local installs needed on your end.
#
# How to use:
#   1. Push this project to a new GitHub repository (public or private, a
#      free account works).
#   2. Go to the "Actions" tab of the repo - this workflow runs automatically
#      on every push to main, or you can trigger it manually from there
#      ("Run workflow" button).
#   3. When the run finishes (a few minutes), open it and download the
#      "SnapExpand-Windows-Installer" artifact - that's your installable .exe.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapExpand-Windows-Installer
          path: dist/*.exe
